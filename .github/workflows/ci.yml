name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Import sorting (isort)
        run: uv run isort --check-only .

  typecheck:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Type check (mypy)
        run: uv run mypy . --ignore-missing-imports

  docstrings:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Docstring check (pydocstyle)
        run: uv run pydocstyle . --convention=google --add-ignore=D100,D104

  syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Syntax validation
        run: |
          python3 -c "
          import ast, glob, sys
          errors = []
          for f in glob.glob('tests/**/*.py', recursive=True):
              try:
                  with open(f) as fh:
                      ast.parse(fh.read())
              except SyntaxError as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(e, file=sys.stderr)
              sys.exit(1)
          else:
              print(f'All {len(glob.glob(\"tests/**/*.py\", recursive=True))} Python files OK')
          "

  test-collection:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tests
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Sync dependencies
        run: uv sync

      - name: Test collection (pytest --collect-only)
        run: uv run pytest --collect-only -q
